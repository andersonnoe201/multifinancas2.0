/* ── ADD TX ── */
function AddTx({onAdd,syncing}){
  const mob=useMobile();
  const [form,setForm]=useState({type:"despesa",category:"Alimentação",amount:"",description:"",date:new Date().toISOString().slice(0,10)});
  const catList=CATS[form.type];
  const submit=async()=>{if(!form.amount||parseFloat(form.amount)<=0)return alert("Insira um valor válido.");await onAdd({...form,amount:parseFloat(form.amount)});};
  return(
    <div className="fu" style={{maxWidth:540,margin:"0 auto"}}>
      <div style={{marginBottom:mob?18:28}}><h2 style={{fontSize:mob?20:26,fontWeight:800,letterSpacing:"-0.7px"}}>Nova Transação</h2><p style={{color:"var(--muted)",fontSize:13,marginTop:4}}>Salvo e sincronizado automaticamente</p></div>
      <div className="card" style={{padding:mob?18:28}}>
        <div style={{display:"flex",gap:8,marginBottom:mob?18:24,background:"var(--surface2)",padding:5,borderRadius:14}}>
          {[["despesa","Despesa","up","var(--rose)"],["receita","Receita","down","var(--emerald)"]].map(([v,l,ic,col])=>(
            <button key={v} style={{flex:1,padding:mob?"12px":"13px",borderRadius:11,fontSize:14,fontWeight:700,cursor:"pointer",transition:"all .2s",border:`2px solid ${form.type===v?col+"50":"transparent"}`,background:form.type===v?col+"14":"transparent",color:form.type===v?col:"var(--muted)",display:"flex",alignItems:"center",justifyContent:"center",gap:7,fontFamily:"Plus Jakarta Sans"}}
              onClick={()=>setForm(f=>({...f,type:v,category:CATS[v][0].name}))}>
              <IC n={ic} s={15} c={form.type===v?col:"var(--muted)"}/>{l}
            </button>
          ))}
        </div>
        <div style={{marginBottom:18}}>
          <label style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:8}}>Valor</label>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",color:"var(--muted2)",fontWeight:700,fontFamily:"var(--mono)",fontSize:14}}>R$</span>
            <input type="number" inputMode="decimal" min="0" step="0.01" placeholder="0,00" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} className="inp"
              style={{paddingLeft:46,fontSize:mob?20:22,fontFamily:"var(--mono)",fontWeight:700,color:form.type==="receita"?"var(--emerald)":"var(--rose)"}}/>
          </div>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:10}}>Categoria</label>
          <div style={{display:"grid",gridTemplateColumns:mob?"repeat(auto-fill,minmax(72px,1fr))":"repeat(auto-fill,minmax(86px,1fr))",gap:mob?6:8}}>
            {catList.map(cat=>(
              <div key={cat.name} onClick={()=>setForm(f=>({...f,category:cat.name}))}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5,padding:mob?"10px 6px":"12px 8px",borderRadius:12,cursor:"pointer",border:`2px solid ${form.category===cat.name?cat.color+"60":"transparent"}`,background:form.category===cat.name?cat.color+"12":"var(--surface2)",color:form.category===cat.name?cat.color:"var(--muted)",transition:"all .2s"}}>
                <IC n={cat.icon} s={mob?17:20} c={form.category===cat.name?cat.color:"var(--muted)"}/>
                <span style={{fontSize:10,fontWeight:600,textAlign:"center",lineHeight:1.2}}>{cat.name}</span>
              </div>
            ))}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:8}}>Descrição (opcional)</label>
          <input type="text" placeholder="Ex: Conta de luz, Almoço..." value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} className="inp"/>
        </div>
        <div style={{marginBottom:mob?20:24}}>
          <label style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:8}}>Data</label>
          <input type="date" value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} className="inp" style={{colorScheme:"dark"}}/>
        </div>
        <button className="btn btn-primary" onClick={submit} disabled={!form.amount||syncing} style={{width:"100%",padding:"15px",fontSize:15,borderRadius:13}}>
          {syncing?<span className="spin-anim" style={{width:18,height:18,border:"2.5px solid rgba(255,255,255,.3)",borderTopColor:"#fff",borderRadius:"50%",display:"inline-block"}}/>:<><IC n="check" s={16} c="#fff" sw={2.5}/>Salvar Transação</>}
        </button>
      </div>
    </div>
  );
}

/* ── HISTORY ── */
function History({tx,onDelete}){
  const mob=useMobile();
  const [filter,setFilter]=useState("all");const [search,setSearch]=useState("");
  const filtered=tx.filter(t=>filter==="all"||t.type===filter).filter(t=>!search||(t.description||t.category).toLowerCase().includes(search.toLowerCase())).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const totalInc=filtered.filter(t=>t.type==="receita").reduce((s,t)=>s+t.amount,0);
  const totalExp=filtered.filter(t=>t.type==="despesa").reduce((s,t)=>s+t.amount,0);
  return(
    <div className="fu">
      <div style={{marginBottom:mob?18:28}}><h2 style={{fontSize:mob?20:26,fontWeight:800,letterSpacing:"-0.7px"}}>Histórico</h2><p style={{color:"var(--muted)",fontSize:13,marginTop:4}}>Todas as transações registradas</p></div>
      <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(3,1fr)",gap:mob?8:12,marginBottom:mob?12:18}}>
        {[{l:"Receitas",v:totalInc,c:"var(--emerald)"},{l:"Despesas",v:totalExp,c:"var(--rose)"},{l:"Saldo",v:totalInc-totalExp,c:(totalInc-totalExp)>=0?"var(--emerald)":"var(--rose)",full:mob}].map(k=>(
          <div key={k.l} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:mob?"12px 14px":"14px 18px",gridColumn:k.full?"1/-1":"auto"}}>
            <p style={{fontSize:10,color:"var(--muted)",fontWeight:600,marginBottom:5}}>{k.l}</p>
            <p style={{fontSize:mob?14:16,fontWeight:800,fontFamily:"var(--mono)",color:k.c}}>{mob?fmtS(k.v):fmt(k.v)}</p>
          </div>
        ))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{display:"flex",gap:4,flexShrink:0}}>
          {["all","receita","despesa"].map(f=>(
            <button key={f} className="mpill" onClick={()=>setFilter(f)}
              style={{background:filter===f?"var(--surface3)":"transparent",color:filter===f?"var(--text)":"var(--muted)",border:filter===f?"1px solid var(--border2)":"1px solid transparent",fontFamily:"Plus Jakarta Sans",fontSize:mob?11:12,padding:mob?"5px 10px":"6px 12px"}}>
              {f==="all"?"Tudo":f==="receita"?"Receitas":"Despesas"}
            </button>
          ))}
        </div>
        <input type="text" placeholder="Buscar..." value={search} onChange={e=>setSearch(e.target.value)} className="inp" style={{flex:1,minWidth:100,padding:"8px 12px",fontSize:13}}/>
        <p style={{fontSize:11,color:"var(--muted)",flexShrink:0}}>{filtered.length} reg.</p>
      </div>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {filtered.length===0
          ?<div style={{textAlign:"center",padding:"44px 0",color:"var(--muted)"}}><IC n="clock" s={36} c="var(--border2)"/><p style={{marginTop:10,fontSize:13}}>Nenhuma transação encontrada</p></div>
          :filtered.map((t,i)=>(<div key={t.id} style={{borderBottom:i<filtered.length-1?"1px solid var(--border)":"none",padding:mob?"0 8px":"0 4px"}}><TxRow t={t} onDelete={onDelete} mob={mob}/></div>))
        }
      </div>
    </div>
  );
}

/* ── FORECAST (PREVISÃO) ── */
function Forecast({tx,forecast,saveForecast,now}){
  const mob=useMobile();
  const [selMonth,setSelMonth]=useState(now.getMonth());
  const [selYear,setSelYear]=useState(now.getFullYear());
  const fKey=selYear+"-"+String(selMonth+1).padStart(2,"0");
  const fData=forecast[fKey]||{income:[],expenses:[],notes:""};

  const [newItem,setNewItem]=useState({type:"despesa",category:"Alimentação",desc:"",amount:""});
  const [editing,setEditing]=useState(false);

  const addItem=()=>{
    if(!newItem.amount||parseFloat(newItem.amount)<=0)return;
    const item={id:Date.now().toString(),type:newItem.type,category:newItem.category,desc:newItem.desc,amount:parseFloat(newItem.amount)};
    const updated={...fData};
    if(item.type==="receita") updated.income=[...(fData.income||[]),item];
    else updated.expenses=[...(fData.expenses||[]),item];
    saveForecast({...forecast,[fKey]:updated});
    setNewItem({type:"despesa",category:"Alimentação",desc:"",amount:""});
  };

  const removeItem=(type,id)=>{
    const updated={...fData};
    if(type==="receita") updated.income=(fData.income||[]).filter(i=>i.id!==id);
    else updated.expenses=(fData.expenses||[]).filter(i=>i.id!==id);
    saveForecast({...forecast,[fKey]:updated});
  };

  const income=fData.income||[];
  const expenses=fData.expenses||[];
  const totalInc=income.reduce((s,i)=>s+i.amount,0);
  const totalExp=expenses.reduce((s,i)=>s+i.amount,0);
  const projected=totalInc-totalExp;

  // Real data for this month
  const realTx=tx.filter(t=>{const d=new Date(t.date+"T00:00:00");return d.getMonth()===selMonth&&d.getFullYear()===selYear;});
  const realInc=realTx.filter(t=>t.type==="receita").reduce((s,t)=>s+t.amount,0);
  const realExp=realTx.filter(t=>t.type==="despesa").reduce((s,t)=>s+t.amount,0);
  const realBalance=realInc-realExp;

  const quickMonths=Array.from({length:6},(_,i)=>{let m=now.getMonth()+i,y=now.getFullYear();if(m>11){m-=12;y++;}return{m,y,key:y+"-"+String(m+1).padStart(2,"0")};});
  const isFut=new Date(selYear,selMonth)>new Date(now.getFullYear(),now.getMonth());

  // Comparison bar data
  const compCats=CATS.despesa.map(cat=>{
    const fore=expenses.filter(e=>e.category===cat.name).reduce((s,i)=>s+i.amount,0);
    const real=realTx.filter(t=>t.type==="despesa"&&t.category===cat.name).reduce((s,t)=>s+t.amount,0);
    return{...cat,fore,real};
  }).filter(c=>c.fore>0||c.real>0);
  const maxComp=Math.max(...compCats.flatMap(c=>[c.fore,c.real]),1);

  return(
    <div className="fu">
      <div style={{marginBottom:mob?18:28}}>
        <h2 style={{fontSize:mob?20:26,fontWeight:800,letterSpacing:"-0.7px"}}>Previsão Financeira</h2>
        <p style={{color:"var(--muted)",fontSize:13,marginTop:4}}>Simule seus gastos e veja o saldo projetado</p>
      </div>

      {/* Month selector */}
      <div className="card" style={{padding:16,marginBottom:18}}>
        <p style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>Selecionar mês</p>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {quickMonths.map(({m,y,key})=>{
            const isSel=m===selMonth&&y===selYear;
            const hasFore=!!(forecast[key]&&((forecast[key].income||[]).length+(forecast[key].expenses||[]).length)>0);
            return(<button key={key} className="mpill" onClick={()=>{setSelMonth(m);setSelYear(y);}}
              style={{background:isSel?"var(--violet)":"var(--surface2)",color:isSel?"#fff":"var(--muted)",border:"none",position:"relative",fontFamily:"Plus Jakarta Sans"}}>
              {MS[m]} {y!==now.getFullYear()?y.toString().slice(-2):""}
              {hasFore&&!isSel&&<span style={{position:"absolute",top:2,right:2,width:5,height:5,borderRadius:"50%",background:"var(--violet)"}}/>}
            </button>);
          })}
        </div>
      </div>

      {/* Summary KPIs */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:18}}>
        {[
          {l:"Receita Prevista",v:totalInc,c:"var(--emerald)",bg:"rgba(0,229,160,.06)",bc:"rgba(0,229,160,.15)",icon:"down"},
          {l:"Gastos Previstos",v:totalExp,c:"var(--rose)",bg:"rgba(255,79,128,.06)",bc:"rgba(255,79,128,.15)",icon:"up"},
          {l:"Saldo Projetado",v:projected,c:projected>=0?"var(--emerald)":"var(--rose)",bg:projected>=0?"rgba(0,229,160,.06)":"rgba(255,79,128,.06)",bc:projected>=0?"rgba(0,229,160,.15)":"rgba(255,79,128,.15)",icon:projected>=0?"tup":"tdown"},
          ...(!isFut?[{l:"Saldo Real",v:realBalance,c:realBalance>=0?"var(--cyan)":"var(--rose)",bg:"rgba(34,212,245,.06)",bc:"rgba(34,212,245,.15)",icon:"wallet"}]:[]),
        ].map(k=>(
          <div key={k.l} style={{background:k.bg,border:"1px solid "+k.bc,borderRadius:18,padding:"18px 20px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
              <div style={{width:34,height:34,borderRadius:10,background:k.c+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n={k.icon} s={16} c={k.c}/></div>
              <p style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.7px"}}>{k.l}</p>
            </div>
            <p style={{fontSize:22,fontWeight:800,fontFamily:"var(--mono)",color:k.c,letterSpacing:"-0.8px"}}>{fmt(k.v)}</p>
          </div>
        ))}
      </div>

      <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"2fr 1fr",gap:mob?10:14,marginBottom:mob?10:14}}>
        {/* Items list */}
        <div>
          {/* Add item form */}
          {editing&&<div className="card" style={{padding:22,marginBottom:14,border:"1px solid rgba(139,124,248,.2)",animation:"fadeUp .3s ease"}}>
            <h4 style={{fontSize:13,fontWeight:700,marginBottom:16,color:"var(--violet)"}}>Adicionar item previsto</h4>
            <div style={{display:"flex",gap:8,marginBottom:14,background:"var(--surface2)",padding:4,borderRadius:12}}>
              {[["despesa","Despesa","var(--rose)"],["receita","Receita","var(--emerald)"]].map(([v,l,col])=>(
                <button key={v} onClick={()=>setNewItem(f=>({...f,type:v,category:CATS[v][0].name}))}
                  style={{flex:1,padding:"9px",borderRadius:9,fontSize:13,fontWeight:700,cursor:"pointer",border:`1.5px solid ${newItem.type===v?col+"50":"transparent"}`,background:newItem.type===v?col+"12":"transparent",color:newItem.type===v?col:"var(--muted)",fontFamily:"Plus Jakarta Sans"}}>
                  {l}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <div>
                <label style={{fontSize:10,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:6}}>Categoria</label>
                <select className="inp" value={newItem.category} onChange={e=>setNewItem(f=>({...f,category:e.target.value}))} style={{fontSize:13,padding:"10px 12px"}}>
                  {CATS[newItem.type].map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
                </select>
              </div>
              <div>
                <label style={{fontSize:10,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:6}}>Valor (R$)</label>
                <input type="number" min="0" step="0.01" placeholder="0,00" className="inp" value={newItem.amount} onChange={e=>setNewItem(f=>({...f,amount:e.target.value}))} style={{fontSize:13,padding:"10px 12px"}} onKeyDown={e=>e.key==="Enter"&&addItem()}/>
              </div>
            </div>
            <div style={{marginBottom:14}}>
              <label style={{fontSize:10,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",display:"block",marginBottom:6}}>Descrição (opcional)</label>
              <input type="text" className="inp" placeholder="Ex: Aluguel, Salário..." value={newItem.desc} onChange={e=>setNewItem(f=>({...f,desc:e.target.value}))} style={{fontSize:13,padding:"10px 12px"}} onKeyDown={e=>e.key==="Enter"&&addItem()}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button className="btn btn-primary" onClick={addItem} disabled={!newItem.amount} style={{flex:1,padding:"11px",fontSize:13}}><IC n="plus" s={14} c="#fff"/>Adicionar</button>
              <button className="btn btn-ghost" onClick={()=>setEditing(false)} style={{padding:"11px 18px",fontSize:13}}>Cancelar</button>
            </div>
          </div>}

          {!editing&&<button className="btn btn-outline" onClick={()=>setEditing(true)} style={{width:"100%",padding:"12px",fontSize:13,marginBottom:14,borderStyle:"dashed"}}>
            <IC n="plus" s={15} c="var(--muted)"/>Adicionar item previsto
          </button>}

          {/* Receitas previstas */}
          {income.length>0&&<div className="card" style={{padding:20,marginBottom:12}}>
            <h4 style={{fontSize:13,fontWeight:700,marginBottom:12,color:"var(--emerald)",display:"flex",alignItems:"center",gap:7}}><IC n="down" s={14} c="var(--emerald)"/>Receitas Previstas</h4>
            {income.map(item=>{const {icon,color}=getCat("receita",item.category);return(
              <div key={item.id} className="forecast-item" style={{display:"flex",alignItems:"center",gap:12,padding:"10px",borderRadius:12,transition:"background .15s",marginBottom:4}}>
                <div style={{width:34,height:34,borderRadius:10,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n={icon} s={15} c={color}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:600}}>{item.desc||item.category}</p>
                  <p style={{fontSize:11,color:"var(--muted)"}}>{item.category}</p>
                </div>
                <p style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:13,color:"var(--emerald)"}}>{fmt(item.amount)}</p>
                <button onClick={()=>removeItem("receita",item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted2)",padding:4}} onMouseEnter={e=>e.currentTarget.style.color="var(--rose)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted2)"}><IC n="xmark" s={14} c="inherit"/></button>
              </div>
            );})}
          </div>}

          {/* Despesas previstas */}
          {expenses.length>0&&<div className="card" style={{padding:20}}>
            <h4 style={{fontSize:13,fontWeight:700,marginBottom:12,color:"var(--rose)",display:"flex",alignItems:"center",gap:7}}><IC n="up" s={14} c="var(--rose)"/>Despesas Previstas</h4>
            {expenses.map(item=>{const {icon,color}=getCat("despesa",item.category);return(
              <div key={item.id} className="forecast-item" style={{display:"flex",alignItems:"center",gap:12,padding:"10px",borderRadius:12,transition:"background .15s",marginBottom:4}}>
                <div style={{width:34,height:34,borderRadius:10,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n={icon} s={15} c={color}/></div>
                <div style={{flex:1,minWidth:0}}>
                  <p style={{fontSize:13,fontWeight:600}}>{item.desc||item.category}</p>
                  <p style={{fontSize:11,color:"var(--muted)"}}>{item.category}</p>
                </div>
                <p style={{fontFamily:"var(--mono)",fontWeight:700,fontSize:13,color:"var(--rose)"}}>{fmt(item.amount)}</p>
                <button onClick={()=>removeItem("despesa",item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"var(--muted2)",padding:4}} onMouseEnter={e=>e.currentTarget.style.color="var(--rose)"} onMouseLeave={e=>e.currentTarget.style.color="var(--muted2)"}><IC n="xmark" s={14} c="inherit"/></button>
              </div>
            );})}
          </div>}

          {income.length===0&&expenses.length===0&&!editing&&(
            <div className="card" style={{padding:"40px 24px",textAlign:"center"}}>
              <IC n="crystal" s={40} c="var(--border2)"/>
              <p style={{marginTop:12,fontSize:14,color:"var(--muted)"}}>Nenhuma previsão para este mês</p>
              <p style={{fontSize:13,color:"var(--muted2)",marginTop:4}}>Clique em "Adicionar item previsto" para começar</p>
            </div>
          )}
        </div>

        {/* Right panel */}
        <div>
          {/* Saldo visual */}
          <div className="card" style={{padding:22,marginBottom:12,background:projected>=0?"rgba(0,229,160,.05)":"rgba(255,79,128,.05)",border:`1px solid ${projected>=0?"rgba(0,229,160,.2)":"rgba(255,79,128,.2)"}`}}>
            <p style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>Saldo Projetado</p>
            <p style={{fontSize:30,fontWeight:800,fontFamily:"var(--mono)",color:projected>=0?"var(--emerald)":"var(--rose)",letterSpacing:"-1.5px",lineHeight:1}}>{fmt(projected)}</p>
            {!isFut&&<div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)"}}>
              <p style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:6}}>Saldo Real</p>
              <p style={{fontSize:20,fontWeight:700,fontFamily:"var(--mono)",color:"var(--cyan)"}}>{fmt(realBalance)}</p>
              <p style={{fontSize:11,color:"var(--muted)",marginTop:6}}>Diferença: <span style={{color:(realBalance-projected)>=0?"var(--emerald)":"var(--rose)",fontWeight:700}}>{fmt(realBalance-projected)}</span></p>
            </div>}
          </div>

          {/* Breakdown bars */}
          {(totalInc>0||totalExp>0)&&<div className="card" style={{padding:20,marginBottom:12}}>
            <p style={{fontSize:12,fontWeight:700,marginBottom:14}}>Resumo Previsto</p>
            {[{l:"Receitas",v:totalInc,c:"var(--emerald)"},{l:"Despesas",v:totalExp,c:"var(--rose)"}].map(k=>(
              <div key={k.l} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:12,color:"var(--muted)"}}>{k.l}</span>
                  <span style={{fontSize:12,fontFamily:"var(--mono)",fontWeight:600,color:k.c}}>{fmt(k.v)}</span>
                </div>
                <div className="pbar"><div className="pbar-fill" style={{width:Math.max(totalInc,totalExp)>0?(k.v/Math.max(totalInc,totalExp)*100)+"%":"0%",background:k.c}}/></div>
              </div>
            ))}
          </div>}

          {/* Notes */}
          <div className="card" style={{padding:18}}>
            <p style={{fontSize:12,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:7}}><IC n="edit" s={13} c="var(--muted)"/>Notas</p>
            <textarea value={fData.notes||""} onChange={e=>saveForecast({...forecast,[fKey]:{...fData,notes:e.target.value}})} placeholder="Observações, lembretes..." className="inp" style={{height:80,resize:"vertical",fontSize:12,lineHeight:1.6}}/>
          </div>
        </div>
      </div>

      {/* Comparison Chart */}
      {compCats.length>0&&!isFut&&<div className="card" style={{padding:24,marginTop:4}}>
        <h4 style={{fontSize:14,fontWeight:700,marginBottom:4}}>Comparativo: Previsão vs Real</h4>
        <p style={{fontSize:12,color:"var(--muted)",marginBottom:18}}>Por categoria de despesa</p>
        <div style={{display:"flex",gap:10,marginBottom:10}}>
          {[["var(--violet)","Previsto"],["var(--cyan)","Real"]].map(([c,l])=>(
            <span key={l} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"var(--muted)",fontWeight:600}}>
              <span style={{width:8,height:8,borderRadius:2,background:c,display:"inline-block"}}/>{l}
            </span>
          ))}
        </div>
        <div style={{overflowX:"auto"}}>
          <div style={{display:"flex",alignItems:"flex-end",gap:10,height:120,minWidth:compCats.length*70}}>
            {compCats.map(cat=>(
              <div key={cat.name} style={{flex:"0 0 auto",width:60,display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
                <div style={{width:"100%",display:"flex",gap:3,alignItems:"flex-end",height:90}}>
                  <div title={`Previsto: ${fmt(cat.fore)}`} style={{flex:1,background:"linear-gradient(to top,#8b7cf8,#8b7cf850)",borderRadius:"4px 4px 0 0",height:(cat.fore/maxComp*100)+"%",minHeight:cat.fore?3:0,transition:"height .8s ease"}}/>
                  <div title={`Real: ${fmt(cat.real)}`} style={{flex:1,background:"linear-gradient(to top,#22d4f5,#22d4f550)",borderRadius:"4px 4px 0 0",height:(cat.real/maxComp*100)+"%",minHeight:cat.real?3:0,transition:"height .8s ease"}}/>
                </div>
                <span style={{fontSize:9,color:"var(--muted)",textAlign:"center",lineHeight:1.3}}>{cat.name.slice(0,7)}</span>
              </div>
            ))}
          </div>
        </div>
      </div>}
    </div>
  );
}

/* ── PLANNER ── */
function Planner({tx,plan,savePlan,now}){
  const mob=useMobile();
  const [selMonth,setSelMonth]=useState(now.getMonth());
  const [selYear,setSelYear]=useState(now.getFullYear());
  const [editMode,setEditMode]=useState(false);
  const [budgets,setBudgets]=useState({});
  const planKey=selYear+"-"+String(selMonth+1).padStart(2,"0");
  const planData=plan[planKey]||{budgets:{},notes:""};
  useEffect(()=>{setBudgets(planData.budgets||{});},[planKey]);
  const saveBudgets=()=>{savePlan({...plan,[planKey]:{...planData,budgets}});setEditMode(false);};
  const monthTx=useMemo(()=>tx.filter(t=>{const d=new Date(t.date+"T00:00:00");return d.getMonth()===selMonth&&d.getFullYear()===selYear;}),[tx,selMonth,selYear]);
  const actualByCat=useMemo(()=>{const c={};monthTx.filter(t=>t.type==="despesa").forEach(t=>{c[t.category]=(c[t.category]||0)+t.amount;});return c;},[monthTx]);
  const mIncome=monthTx.filter(t=>t.type==="receita").reduce((s,t)=>s+t.amount,0);
  const mExpense=monthTx.filter(t=>t.type==="despesa").reduce((s,t)=>s+t.amount,0);
  const totalBudget=Object.values(planData.budgets||{}).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const isCur=selMonth===now.getMonth()&&selYear===now.getFullYear();
  const isFut=new Date(selYear,selMonth)>new Date(now.getFullYear(),now.getMonth());
  const quickMonths=Array.from({length:8},(_,i)=>{let m=now.getMonth()-1+i,y=now.getFullYear();if(m<0){m+=12;y--;}if(m>11){m-=12;y++;}return{m,y,key:y+"-"+String(m+1).padStart(2,"0")};});
  return(
    <div className="fu">
      <div style={{marginBottom:mob?18:28,display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>

        <button className="btn btn-outline" style={{padding:"10px 18px",fontSize:13}} onClick={()=>setEditMode(e=>!e)}>
          <IC n="edit" s={14} c={editMode?"var(--violet)":"var(--muted)"}/>{editMode?"Cancelar":"Editar orçamento"}
        </button>
      </div>
      <div className="card" style={{padding:16,marginBottom:18}}>
        <p style={{fontSize:11,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:10}}>Selecionar mês</p>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {quickMonths.map(({m,y,key})=>{
            const isCurM=m===now.getMonth()&&y===now.getFullYear();const isSel=m===selMonth&&y===selYear;
            const hasPlan=!!(plan[key]?.budgets&&Object.keys(plan[key].budgets).length>0);
            return(<button key={key} className="mpill" onClick={()=>{setSelMonth(m);setSelYear(y);setEditMode(false);}}
              style={{background:isSel?"var(--violet)":isCurM?"var(--violet-dim)":"var(--surface2)",color:isSel?"#fff":isCurM?"var(--violet)":"var(--muted)",border:isSel?"none":isCurM?"1px solid rgba(139,124,248,.25)":"1px solid transparent",position:"relative",fontFamily:"Plus Jakarta Sans"}}>
              {MS[m]}{y!==now.getFullYear()?" "+y.toString().slice(-2):""}
              {hasPlan&&!isSel&&<span style={{position:"absolute",top:2,right:2,width:5,height:5,borderRadius:"50%",background:"var(--violet)"}}/>}
            </button>);
          })}
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <h3 style={{fontSize:18,fontWeight:700}}>{MP[selMonth]} {selYear}</h3>
        {isCur&&<span className="badge" style={{background:"var(--violet-dim)",color:"var(--violet)",border:"1px solid rgba(139,124,248,.22)"}}>Mês atual</span>}

      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(155px,1fr))",gap:12,marginBottom:18}}>
        {[{l:"Receitas",v:mIncome,c:"var(--emerald)",icon:"down"},{l:"Despesas",v:mExpense,c:"var(--rose)",icon:"up"},{l:"Orçamento",v:totalBudget,c:"var(--amber)",icon:"target"},{l:"Saldo",v:mIncome-mExpense,c:(mIncome-mExpense)>=0?"var(--emerald)":"var(--rose)",icon:"wallet"}].map(k=>(
          <div key={k.l} className="card" style={{padding:"16px 18px",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:36,height:36,borderRadius:10,background:k.c+"14",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IC n={k.icon} s={16} c={k.c}/></div>
            <div><p style={{fontSize:10,color:"var(--muted)",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.6px"}}>{k.l}</p><p style={{fontSize:16,fontWeight:800,fontFamily:"var(--mono)",color:k.c,letterSpacing:"-0.5px"}}>{fmt(k.v)}</p></div>
          </div>
        ))}
      </div>
      <div className="card" style={{padding:mob?16:24}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <h4 style={{fontSize:14,fontWeight:700}}>Orçamento por Categoria</h4>
          {editMode&&<button className="btn btn-primary" onClick={saveBudgets} style={{padding:"8px 16px",fontSize:12}}><IC n="check" s={13} c="#fff" sw={2.5}/>Salvar</button>}
        </div>
        {editMode?(
          <div style={{display:"grid",gridTemplateColumns:mob?"1fr 1fr":"repeat(auto-fill,minmax(200px,1fr))",gap:mob?10:12}}>
            {CATS.despesa.map(cat=>(
              <div key={cat.name} style={{background:"var(--surface2)",borderRadius:13,padding:"14px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                  <div style={{width:28,height:28,borderRadius:8,background:cat.color+"18",display:"flex",alignItems:"center",justifyContent:"center"}}><IC n={cat.icon} s={14} c={cat.color}/></div>
                  <span style={{fontSize:13,fontWeight:600}}>{cat.name}</span>
                </div>
                <div style={{position:"relative"}}>
                  <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"var(--muted2)",fontFamily:"var(--mono)"}}>R$</span>
                  <input type="number" min="0" step="10" placeholder="0,00" value={budgets[cat.name]||""} onChange={e=>setBudgets(b=>({...b,[cat.name]:e.target.value}))} className="inp" style={{paddingLeft:32,fontSize:13,padding:"9px 12px 9px 32px",fontFamily:"var(--mono)"}}/>
                </div>
              </div>
            ))}
          </div>
        ):(
          <div>
            {CATS.despesa.map(cat=>{
              const budget=parseFloat(planData.budgets?.[cat.name])||0;const actual=actualByCat[cat.name]||0;
              if(!budget&&!actual)return null;
              const pct=budget>0?Math.min(100,(actual/budget)*100):0;const over=budget>0&&actual>budget;
              return(<div key={cat.name} style={{marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:28,height:28,borderRadius:8,background:cat.color+"18",display:"flex",alignItems:"center",justifyContent:"center"}}><IC n={cat.icon} s={14} c={cat.color}/></div>
                    <span style={{fontSize:13,fontWeight:500}}>{cat.name}</span>
                    {over&&<span className="badge" style={{background:"var(--rose-dim)",color:"var(--rose)",border:"1px solid rgba(255,79,128,.2)"}}><IC n="alert" s={10} c="var(--rose)"/>Ultrapassou</span>}
                  </div>
                  <div style={{textAlign:"right"}}>
                    <span style={{fontSize:13,fontFamily:"var(--mono)",color:over?"var(--rose)":"var(--text)",fontWeight:600}}>{fmt(actual)}</span>
                    {budget>0&&<span style={{fontSize:12,color:"var(--muted)",fontFamily:"var(--mono)"}}> / {fmt(budget)}</span>}
                  </div>
                </div>
                {budget>0&&<div className="pbar"><div className="pbar-fill" style={{width:pct+"%",background:over?"var(--rose)":pct>75?"var(--amber)":cat.color}}/></div>}
                {!budget&&<div style={{height:4,background:cat.color+"40",borderRadius:3}}/>}
              </div>);
            })}
            {Object.keys(actualByCat).length===0&&Object.keys(planData.budgets||{}).length===0&&(
              <div style={{textAlign:"center",padding:"24px 0",color:"var(--muted)"}}>
                <IC n="target" s={36} c="var(--border2)"/><p style={{marginTop:10,fontSize:14}}>Nenhum dado para este mês.</p>
                <p style={{fontSize:13,color:"var(--muted2)",marginTop:4}}>Clique em Editar orçamento para definir metas.</p>
              </div>
            )}
          </div>
        )}
      </div>
      <div className="card" style={{padding:22,marginTop:14}}>
        <h4 style={{fontSize:13,fontWeight:700,marginBottom:10,display:"flex",alignItems:"center",gap:7}}><IC n="edit" s={14} c="var(--muted)"/>Notas do mês</h4>
        <textarea value={planData.notes||""} onChange={e=>savePlan({...plan,[planKey]:{...planData,notes:e.target.value}})} placeholder="Anotações, metas, lembretes..." className="inp" style={{height:80,resize:"vertical",fontSize:13,lineHeight:1.6}}/>
      </div>
    </div>
  );
}

/* ── CONFIG ── */
function Config({dbStatus,tx}){
  const mob=useMobile();
  const exportCSV=()=>{
    const csv=[["id","data","tipo","categoria","descricao","valor"],...tx.map(t=>[t.id,t.date,t.type,t.category,t.description||"",t.amount])].map(r=>r.join(";")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv"}));
    a.download="multifinanças_"+new Date().toISOString().slice(0,10)+".csv";a.click();
  };
  const si={live:{c:"var(--emerald)",label:"Online — sincronizando em tempo real"},offline:{c:"var(--amber)",label:"Conectando ao banco..."},error:{c:"var(--rose)",label:"Erro de conexão"},none:{c:"var(--muted2)",label:"Sem conexão"}}[dbStatus]||{c:"var(--muted2)",label:"Sem conexão"};
  return(
    <div className="fu">
      <div style={{marginBottom:mob?18:28}}><h2 style={{fontSize:mob?20:26,fontWeight:800,letterSpacing:"-0.7px"}}>Configurações</h2><p style={{color:"var(--muted)",fontSize:13,marginTop:4}}>Status e preferências</p></div>
      <div style={{display:"grid",gap:14}}>
        <div className="card" style={{padding:24}}>
          <h3 style={{fontSize:14,fontWeight:700,marginBottom:16,display:"flex",alignItems:"center",gap:8}}><IC n="db" s={16} c="var(--muted)"/>Status do Banco de Dados</h3>
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px",background:"var(--surface2)",borderRadius:12,marginBottom:14}}>
            <div style={{width:9,height:9,borderRadius:"50%",background:si.c,flexShrink:0,boxShadow:"0 0 10px "+si.c+"80"}}/>
            <div>
              <p style={{fontSize:13,fontWeight:600,color:si.c}}>{si.label}</p>
              <p style={{fontSize:11,color:"var(--muted)",marginTop:2}}>Projeto: <strong>{window.FF_CONFIG?.projectId||"não configurado"}</strong></p>
            </div>
          </div>
          <div className="info-box info-violet" style={{marginBottom:0}}>
            <IC n="cloud" s={13} c="var(--violet)"/> Dados sincronizados automaticamente entre todos os usuários e dispositivos em tempo real.
          </div>
        </div>
        <div className="card" style={{padding:20,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            <div style={{width:40,height:40,borderRadius:12,background:"var(--blue-dim)",display:"flex",alignItems:"center",justifyContent:"center"}}><IC n="download" s={18} c="var(--blue)"/></div>
            <div><p style={{fontWeight:700,fontSize:13}}>Exportar CSV</p><p style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{tx.length} transações disponíveis</p></div>
          </div>
          <button className="btn btn-outline" onClick={exportCSV} disabled={tx.length===0} style={{padding:"10px 18px",fontSize:13}}><IC n="download" s={14} c="var(--muted)"/>Download CSV</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
